services:
  - type: web
    name: fallout-nova-scotia-gm
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        value: https://ungelwwyhwjpuirziboh.supabase.co
      - key: PERIODIC_SAVE_MS
        value: "60000"
      - key: SAVE_BACKUP_LIMIT
        value: "20"
      - key: SUPABASE_TABLE
        value: game_state
